<script>
/* ================================================================
   supply.html — interactions
   1) 「下次自动选择」 switch toggle
   2) 自质检 sub-category single-select (radio behavior, default 手机3C)
   ================================================================ */
(function () {
  // Switch
  const sw = document.getElementById('rememberToggle');
  if (sw) {
    sw.addEventListener('click', () => {
      const next = !sw.classList.contains('on');
      sw.classList.toggle('on', next);
      sw.setAttribute('aria-checked', String(next));
    });
  }

  // Sub-categories
  document.querySelectorAll('[data-subcat-group]').forEach(group => {
    const items = group.querySelectorAll('.subcat');
    items.forEach(it => {
      it.addEventListener('click', () => {
        items.forEach(x => x.classList.remove('on'));
        it.classList.add('on');
      });
    });
  });
})();
</script>
<script>
  // Sidebar: group expand/collapse + click-to-activate.
  // Single items (.nav-item) and leaf sub-items (.nav-sub) share the same active model;
  // group headers (.nav-grouphead) only toggle expand/collapse — they never carry .active.
  (function () {
    var nav = document.querySelector('.side .nav');
    if (!nav) return;
    function setActive(el) {
      nav.querySelectorAll('.nav-item.active, .nav-sub.active').forEach(function (n) { n.classList.remove('active'); });
      el.classList.add('active');
    }
    nav.addEventListener('click', function (e) {
      var head = e.target.closest('.nav-grouphead');
      if (head) {
        var g = head.closest('.nav-group');
        g.dataset.expanded = g.dataset.expanded === 'true' ? 'false' : 'true';
        return;
      }
      var leaf = e.target.closest('.nav-item, .nav-sub');
      if (leaf) setActive(leaf);
    });
    // Scroll active item into view on load
    var active = nav.querySelector('.nav-sub.active, .nav-item.active');
    if (active) nav.scrollTop = Math.max(0, active.offsetTop - 80);
  })();
</script>
