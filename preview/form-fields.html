<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><title>Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin:0; padding:22px; background:#fff; font-family:var(--zzt-font-sans); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:18px 28px; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .label { font-size:12px; color: var(--zzt-fg); font-weight:500; }
  .label .req { color: var(--zzt-danger-500); margin-left:2px;}
  .input { display:flex; align-items:center; gap:8px; height:38px; padding:0 12px; background:#fff;
           border:1px solid var(--zzt-border); border-radius:8px; font-size:14px;}
  .input.placeholder span { color: var(--zzt-fg-subtle); }
  .input.focused { border-color: var(--zzt-accent-500); box-shadow: 0 0 0 3px rgba(255,15,39,.18); }
  .input.error { border-color: var(--zzt-danger-500); }
  .input.disabled { background: var(--zzt-zinc-100); color: var(--zzt-fg-subtle); }
  .help { font-size:11.5px; color: var(--zzt-fg-muted); }
  .help.error { color: var(--zzt-danger-500); }
  .input i { width:14px; height:14px; color: var(--zzt-fg-muted); }
</style></head><body>
<div class="grid">
  <div class="field">
    <span class="label">SKU 名称<span class="req">*</span></span>
    <div class="input"><span>iPhone 14 Pro 256GB 深空黑</span></div>
    <span class="help">默认状态，已填值</span>
  </div>
  <div class="field">
    <span class="label">分类</span>
    <div class="input placeholder"><span>请选择品类</span><i data-lucide="chevron-down" style="margin-left:auto"></i></div>
    <span class="help">空置 placeholder</span>
  </div>
  <div class="field">
    <span class="label">售价<span class="req">*</span></span>
    <div class="input focused"><span>¥ 4,599</span></div>
    <span class="help">focus + 焦点环</span>
  </div>
  <div class="field">
    <span class="label">库存</span>
    <div class="input error"><span>—</span></div>
    <span class="help error">库存不能为空</span>
  </div>
  <div class="field">
    <span class="label">店铺 ID</span>
    <div class="input disabled"><span>ZZT-K-04812</span></div>
    <span class="help">disabled</span>
  </div>
  <div class="field">
    <span class="label">关键词搜索</span>
    <div class="input"><i data-lucide="search"></i><span style="color:var(--zzt-fg-subtle)">搜索商品 / SKU / 订单号</span></div>
    <span class="help">leading 图标</span>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
