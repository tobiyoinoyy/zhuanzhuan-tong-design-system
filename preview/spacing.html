<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--zzt-font-sans); }
  .row { display:flex; align-items:center; gap:14px; margin-bottom: 8px; }
  .bar { background: var(--zzt-accent-soft); height:18px; border-radius:4px; }
  .label { font-size:11px; font-family: var(--zzt-font-mono); width:84px; color:var(--zzt-fg-muted); }
  .name { font-size:11px; font-weight:600; width:42px; }
</style></head><body>
<div class="row"><span class="name">1</span><span class="label">4 px</span><div class="bar" style="width:4px"></div></div>
<div class="row"><span class="name">2</span><span class="label">8 px</span><div class="bar" style="width:8px"></div></div>
<div class="row"><span class="name">3</span><span class="label">12 px</span><div class="bar" style="width:12px"></div></div>
<div class="row"><span class="name">4 ★</span><span class="label">16 px</span><div class="bar" style="width:16px"></div></div>
<div class="row"><span class="name">6 ★</span><span class="label">24 px</span><div class="bar" style="width:24px"></div></div>
<div class="row"><span class="name">8</span><span class="label">32 px</span><div class="bar" style="width:32px"></div></div>
<div class="row"><span class="name">12</span><span class="label">48 px</span><div class="bar" style="width:48px"></div></div>
<div class="row"><span class="name">16</span><span class="label">64 px</span><div class="bar" style="width:64px"></div></div>
</body></html>
