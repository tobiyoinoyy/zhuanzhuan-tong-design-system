<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--zzt-zinc-75); padding: 18px; }
  .stage { position: relative; width: 220px; height: 140px; border-radius: 12px; overflow: hidden;
           background: linear-gradient(135deg, #B7C9E2 0%, #6F8FBD 100%); }
  .stage.photo { background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,.3), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,.2), transparent 60%),
    linear-gradient(135deg, #FAB186, #BB81EE 100%); }
  .stage .scrim { position:absolute; inset:0; background: rgba(24,24,27,0.45); }
  .stage .scrim.blur { backdrop-filter: blur(2px); }
  .stage .scrim.heavy { background: rgba(24,24,27,0.65); }
  .stage .scrim.grad { background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%); }
  .stage .l { position:absolute; bottom: 6px; left: 8px; color: #fff; font-size: 11px; font-family: var(--zzt-font-mono); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
</style></head><body>
<div class="grid">
  <div class="stage"><div class="scrim"></div><span class="l">opaque · 45%</span></div>
  <div class="stage"><div class="scrim blur"></div><span class="l">blur 2px</span></div>
  <div class="stage"><div class="scrim heavy"></div><span class="l">heavy · 65%</span></div>
  <div class="stage photo"><div class="scrim grad"></div><span class="l">gradient</span></div>
</div>
<div style="margin-top: 14px; font-size: 12.5px; color: var(--zzt-fg-muted); line-height: 1.5;">
  Modal & drawer scrim: <code>rgba(24,24,27,0.45)</code> + 2 px blur (default). Use heavy 65% only for full-screen captures. Gradient overlays sit under hero text on image cards — never as standalone backgrounds.
</div>
</body></html>
