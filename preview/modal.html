<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { background: var(--zzt-zinc-75); padding: 20px; }
  .modal { width: 440px; background:#fff; border-radius: 20px; box-shadow: var(--zzt-shadow-xl);
           border: 1px solid rgba(0,0,0,.06); overflow: hidden; }
  .m-head { padding: 22px 24px 4px; display: flex; gap: 14px; align-items: flex-start; }
  .m-icon { width: 36px; height: 36px; border-radius: 999px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .m-icon.danger { background: rgba(255,15,39,.12); color: var(--zzt-danger-500); }
  .m-icon.warning { background: rgba(245,165,36,.16); color: var(--zzt-warning-500); }
  .m-icon i { width: 18px; height: 18px; }
  .m-title { font-size: 16px; font-weight: 600; }
  .m-desc { font-size: 13.5px; color: var(--zzt-fg-muted); margin-top: 6px; line-height: 1.5; }
  .m-body { padding: 16px 24px; }
  .m-foot { padding: 12px 16px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid var(--zzt-border-subtle); background: var(--zzt-zinc-75); }
  .x { position: absolute; top: 14px; right: 14px; width: 28px; height: 28px; border-radius: 999px;
      background: var(--zzt-zinc-150); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  .x i { width: 14px; height: 14px; color: var(--zzt-fg-muted); }
  .ctx { position: relative; }
  .field-row { display:flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .field-row .lbl { font-size: 12.5px; font-weight: 500; }
  .modal2 { width: 420px; background:#fff; border-radius: 20px; box-shadow: var(--zzt-shadow-xl); border: 1px solid rgba(0,0,0,.06); overflow: hidden; }
</style></head><body>
<div class="row" style="gap: 22px; align-items: flex-start;">
  <div class="ctx modal">
    <div class="x"><i data-lucide="x"></i></div>
    <div class="m-head">
      <div class="m-icon danger"><i data-lucide="alert-triangle"></i></div>
      <div>
        <div class="m-title">确定要删除该 SKU 吗？</div>
        <div class="m-desc">SKU-58219 · iPhone 14 Pro 256GB 深空黑 · 删除后将无法恢复，且会同步从所有进行中的活动中移除。</div>
      </div>
    </div>
    <div class="m-foot">
      <button class="btn ghost sm">取消</button>
      <button class="btn danger sm">删除</button>
    </div>
  </div>

  <div class="ctx modal2">
    <div class="x"><i data-lucide="x"></i></div>
    <div class="m-head">
      <div>
        <div class="m-title">批量改价</div>
        <div class="m-desc">已选 12 个 SKU · 应用统一调整策略</div>
      </div>
    </div>
    <div class="m-body">
      <div class="field-row">
        <span class="lbl">调整方式</span>
        <div class="row" style="gap: 4px;">
          <button class="btn outline sm" style="background:var(--zzt-zinc-150);">按百分比</button>
          <button class="btn ghost sm">固定金额</button>
          <button class="btn ghost sm">设为指定价</button>
        </div>
      </div>
      <div class="field-row">
        <span class="lbl">下调比例</span>
        <div class="input" style="height:36px;"><span style="color:var(--zzt-fg-muted)">-</span><span style="font-family:var(--zzt-font-num); font-weight:500;">10</span><span style="margin-left:auto; color: var(--zzt-fg-muted)">%</span></div>
      </div>
    </div>
    <div class="m-foot">
      <button class="btn ghost sm">取消</button>
      <button class="btn primary sm">确认调价</button>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
