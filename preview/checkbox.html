<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  .ck { width: 16px; height: 16px; border: 1.5px solid var(--zzt-border-strong); border-radius: 4px;
        background:#fff; position: relative; display: inline-block; flex-shrink: 0; vertical-align: middle; cursor: pointer; }
  .ck.on { background: var(--zzt-accent-500); border-color: var(--zzt-accent-500); }
  .ck.on::after { content:""; position:absolute; left:4px; top:1px; width:5px; height:9px;
                  border-right:2px solid #fff; border-bottom:2px solid #fff; transform: rotate(45deg); }
  .ck.indeterminate { background: var(--zzt-accent-500); border-color: var(--zzt-accent-500); }
  .ck.indeterminate::after { content:""; position:absolute; left:3px; top:6.5px; width:8px; height:2px; background:#fff; border-radius:1px; }
  .ck.invalid { border-color: var(--zzt-danger-500); box-shadow: 0 0 0 3px rgba(255,15,39,.16); }
  .ck.disabled { opacity:.4; pointer-events: none; }
  .ck.focus { box-shadow: 0 0 0 3px rgba(255,15,39,.20); border-color: var(--zzt-accent-500); }
  .field { display:flex; gap:10px; align-items:flex-start; }
  .field .label { font-size:13.5px; font-weight:500; }
  .field .desc { font-size:12px; color: var(--zzt-fg-muted); margin-top: 2px; }
  .group { display: flex; flex-direction: column; gap: 10px; }
  .group.h { flex-direction: row; gap: 22px; }
</style></head><body>
<div class="col" style="gap: 16px;">
  <div class="row" style="gap: 24px;">
    <div class="field"><span class="ck"></span><span class="label">默认</span></div>
    <div class="field"><span class="ck on"></span><span class="label">已选</span></div>
    <div class="field"><span class="ck indeterminate"></span><span class="label">部分选中</span></div>
    <div class="field"><span class="ck focus"></span><span class="label">焦点</span></div>
    <div class="field"><span class="ck invalid"></span><span class="label">错误</span></div>
    <div class="field"><span class="ck on disabled"></span><span class="label" style="color:var(--zzt-fg-subtle)">禁用</span></div>
  </div>
  <hr style="border:0;border-top:1px dashed var(--zzt-border-subtle);">
  <div class="lab">Vertical group · with descriptions</div>
  <div class="group">
    <div class="field"><span class="ck on"></span><div><div class="label">仅在售商品</div><div class="desc">不含已下架与质检中的 SKU</div></div></div>
    <div class="field"><span class="ck on"></span><div><div class="label">仅本店</div><div class="desc">不含分仓在售的商品</div></div></div>
    <div class="field"><span class="ck"></span><div><div class="label">参与「618 大促」</div><div class="desc">活动期内自动应用满 200 减 30</div></div></div>
  </div>
  <div class="lab" style="margin-top: 6px;">Horizontal group · compact</div>
  <div class="group h">
    <div class="field"><span class="ck on"></span><span class="label">手机</span></div>
    <div class="field"><span class="ck on"></span><span class="label">平板</span></div>
    <div class="field"><span class="ck"></span><span class="label">笔记本</span></div>
    <div class="field"><span class="ck"></span><span class="label">耳机</span></div>
    <div class="field"><span class="ck"></span><span class="label">手表</span></div>
  </div>
</div>
</body></html>
