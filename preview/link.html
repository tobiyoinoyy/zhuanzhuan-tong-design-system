<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .link  { color: var(--zzt-accent-500); text-decoration: none; font-weight: 500; }
  .link:hover { text-decoration: underline; }
  .link.muted { color: var(--zzt-fg-muted); }
  .link.muted:hover { color: var(--zzt-fg); text-decoration: underline; }
  .link.danger { color: var(--zzt-danger-500); }
  .link.disabled { color: var(--zzt-fg-subtle); pointer-events: none; }
  .link.with-icon { display:inline-flex; align-items: center; gap: 3px; }
  .link.with-icon i { width: 12px; height: 12px; }
  .row + .row { margin-top: 12px; }
  .lbl { font-size: 12px; color: var(--zzt-fg-muted); margin-bottom: 6px; }
  .col-gap { display: flex; flex-direction: column; gap: 18px; font-size: 14px; }
</style></head><body>
<div class="col-gap">
  <div>
    <div class="lbl">colors / states</div>
    <div class="row" style="gap: 24px;">
      <a class="link">查看详情</a>
      <a class="link" style="text-decoration: underline">已访问</a>
      <a class="link muted">辅助链接</a>
      <a class="link danger">放弃修改</a>
      <a class="link disabled">不可用</a>
    </div>
  </div>
  <div>
    <div class="lbl">with icon</div>
    <div class="row" style="gap: 24px;">
      <a class="link with-icon">下一步<i data-lucide="arrow-right"></i></a>
      <a class="link with-icon"><i data-lucide="external-link"></i>查看完整报告</a>
      <a class="link with-icon"><i data-lucide="download"></i>下载结算单</a>
      <a class="link muted with-icon"><i data-lucide="chevron-right"></i>展开详细记录</a>
    </div>
  </div>
  <div>
    <div class="lbl">inline · 行内嵌入正文</div>
    <p style="margin:0; line-height: 1.6; color: var(--zzt-fg-muted);">
      本次质检详见 <a class="link">SKU-58219 报告</a>，如需驳回请联系 <a class="link">客服经理 · 张工</a>，或前往
      <a class="link">退回流程说明</a> 了解操作细节。
    </p>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
