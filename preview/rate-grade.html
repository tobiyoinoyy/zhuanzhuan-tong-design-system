<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .rate { display: inline-flex; gap: 4px; align-items: center; }
  .rate i { width: 22px; height: 22px; color: var(--zzt-zinc-300); }
  .rate i.on { color: var(--zzt-warning-500); fill: var(--zzt-warning-500); }
  .rate .num { margin-left: 8px; font-family: var(--zzt-font-num); font-weight: 600; font-size: 14px; }
  .rate.sm i { width: 14px; height: 14px; }
  .rate.lg i { width: 28px; height: 28px; }
  .row + .row { margin-top: 16px; }
  .lbl { font-size: 11.5px; color: var(--zzt-fg-muted); width: 120px; }
  .pill-tone { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; padding: 1px 8px; border-radius: 999px; font-weight: 500; }
</style></head><body>
<div class="col" style="gap: 14px;">
  <div class="row"><span class="lbl">empty</span>
    <div class="rate"><i data-lucide="star"></i><i data-lucide="star"></i><i data-lucide="star"></i><i data-lucide="star"></i><i data-lucide="star"></i></div>
  </div>
  <div class="row"><span class="lbl">3.5 / 5</span>
    <div class="rate"><i data-lucide="star" class="on"></i><i data-lucide="star" class="on"></i><i data-lucide="star" class="on"></i><i data-lucide="star-half" class="on"></i><i data-lucide="star"></i><span class="num">3.5</span></div>
  </div>
  <div class="row"><span class="lbl">5 / 5</span>
    <div class="rate"><i data-lucide="star" class="on"></i><i data-lucide="star" class="on"></i><i data-lucide="star" class="on"></i><i data-lucide="star" class="on"></i><i data-lucide="star" class="on"></i><span class="num">5.0</span></div>
  </div>
  <div class="row"><span class="lbl">small · table cell</span>
    <div class="rate sm"><i data-lucide="star" class="on"></i><i data-lucide="star" class="on"></i><i data-lucide="star" class="on"></i><i data-lucide="star" class="on"></i><i data-lucide="star"></i><span class="num" style="font-size:12px">4.0</span></div>
  </div>
  <div class="row"><span class="lbl">large · interactive</span>
    <div class="rate lg"><i data-lucide="star" class="on"></i><i data-lucide="star" class="on"></i><i data-lucide="star" class="on"></i><i data-lucide="star" class="on"></i><i data-lucide="star"></i></div>
  </div>
  <hr style="border:0; border-top:1px dashed var(--zzt-border-subtle); margin: 6px 0;">
  <div class="row"><span class="lbl">商户分</span>
    <span class="pill-tone" style="background: rgba(23,201,100,.12); color:#0a8a44">优 · 4.8</span>
    <span class="pill-tone" style="background: rgba(255,15,39,.12); color: #A20017">良 · 4.2</span>
    <span class="pill-tone" style="background: rgba(245,165,36,.16); color:#9a6608">中 · 3.5</span>
    <span class="pill-tone" style="background: rgba(255,15,39,.12); color:#A20017">差 · 2.4</span>
  </div>
  <div class="row"><span class="lbl">质检等级</span>
    <span style="font-family: var(--zzt-font-num); font-weight: 600; padding: 4px 10px; border-radius: 6px; background: rgba(255,15,39,.14); color: var(--zzt-accent-700)">S</span>
    <span style="font-family: var(--zzt-font-num); font-weight: 600; padding: 4px 10px; border-radius: 6px; background: rgba(23,201,100,.14); color: #0a8a44">A</span>
    <span style="font-family: var(--zzt-font-num); font-weight: 600; padding: 4px 10px; border-radius: 6px; background: rgba(245,165,36,.18); color: #9a6608">B</span>
    <span style="font-family: var(--zzt-font-num); font-weight: 600; padding: 4px 10px; border-radius: 6px; background: rgba(255,15,39,.12); color: #A20017">C</span>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
