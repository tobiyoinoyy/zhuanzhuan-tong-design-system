<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { background: var(--zzt-zinc-75); padding: 30px 22px; }
  .anchor { display:inline-flex; align-items:center; gap:6px; padding: 6px 12px;
            background:#fff; border:1px solid var(--zzt-border-strong); border-radius:8px;
            font-size: 13px; color: var(--zzt-fg); }
  .ttwrap { position: relative; display: inline-block; }
  .tt { position: absolute; padding: 6px 10px; background:#fff; color: var(--zzt-fg);
        border-radius: 8px; font-size: 12px; line-height:1.4; white-space: nowrap;
        box-shadow: var(--zzt-shadow-md); border:1px solid var(--zzt-border-subtle); }
  .tt::after { content:""; position:absolute; width:8px; height:8px;
               background: inherit; border: inherit; transform: rotate(45deg); }
  .tt.dark { background:#18181B; color:#fff; border-color: transparent; }
  /* placements */
  .tt.top { bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); }
  .tt.top::after { top: 100%; left: 50%; transform: translate(-50%, -50%) rotate(45deg); border-top: 0; border-left: 0; }
  .tt.right { left: calc(100% + 10px); top: 50%; transform: translateY(-50%); }
  .tt.right::after { left: 0; top: 50%; transform: translate(-50%, -50%) rotate(45deg); border-right: 0; border-top: 0; }
  .tt.bot { top: calc(100% + 10px); left: 50%; transform: translateX(-50%); }
  .tt.bot::after { bottom: 100%; left: 50%; transform: translate(-50%, 50%) rotate(45deg); border-bottom: 0; border-right: 0; }
  .tt.left { right: calc(100% + 10px); top: 50%; transform: translateY(-50%); }
  .tt.left::after { right: 0; top: 50%; transform: translate(50%, -50%) rotate(45deg); border-left: 0; border-bottom: 0; }
</style></head><body>
<div class="row" style="gap: 80px;">
  <div class="ttwrap"><span class="anchor">top</span><span class="tt top">¥ 128,540 · 累计销售额</span></div>
  <div class="ttwrap"><span class="anchor">right</span><span class="tt right">SKU-58219 · 已售出 28 件</span></div>
  <div class="ttwrap"><span class="anchor">bottom</span><span class="tt bot dark">点击查看完整报告</span></div>
  <div class="ttwrap"><span class="anchor">left</span><span class="tt left dark">质检员 · 张工</span></div>
</div>
<div class="note" style="margin-top:48px;">Light variant for facts / definitions; dark variant for actions / shortcuts. Always 8 px radius with a 4 px caret.</div>
</body></html>
