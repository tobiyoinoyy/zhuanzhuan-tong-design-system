<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .field { display: flex; flex-direction: column; gap: 6px; }
  .l { font-size: 12px; color: var(--zzt-fg-muted); }
  .input-row { display: inline-flex; align-items: center; height: 36px; background:#fff; border: 1px solid var(--zzt-border); border-radius: 8px; padding: 0 12px; gap: 8px; min-width: 220px; }
  .input-row i { width: 14px; height: 14px; color: var(--zzt-fg-muted); }
  .input-row.focus { border-color: var(--zzt-accent-500); box-shadow: 0 0 0 3px rgba(255,15,39,.16); }
  .range { display: inline-flex; align-items: center; height: 36px; background:#fff; border: 1px solid var(--zzt-border); border-radius: 8px; padding: 0 4px 0 12px; gap: 6px; min-width: 320px; }
  .range .from, .range .to { flex: 1; font-family: var(--zzt-font-num); font-variant-numeric: tabular-nums; }
  .range .sep-arrow { color: var(--zzt-fg-muted); }
  .range button { background: var(--zzt-zinc-150); border: 0; height: 28px; padding: 0 10px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; font-size: 12px; cursor: pointer; }
  .range button i { width: 12px; height: 12px; }
  .time-picker { background: #fff; border-radius: 12px; box-shadow: var(--zzt-shadow-md); padding: 8px 0; width: 220px; border: 1px solid rgba(0,0,0,.06); }
  .time-cols { display: flex; height: 200px; overflow: hidden; padding: 0 8px; }
  .col-time { flex: 1; display: flex; flex-direction: column; align-items: center; overflow-y: auto; scrollbar-width: none; }
  .col-time::-webkit-scrollbar { display: none; }
  .col-time .v { padding: 6px 12px; border-radius: 8px; font-family: var(--zzt-font-num); font-variant-numeric: tabular-nums; font-size: 14px; color: var(--zzt-fg-muted); cursor: pointer; }
  .col-time .v.sel { background: var(--zzt-accent-soft); color: var(--zzt-accent-700); font-weight: 600; }
  .col-time .v:hover { color: var(--zzt-fg); }
  .time-foot { padding: 8px 12px 4px; display: flex; justify-content: space-between; border-top: 1px solid var(--zzt-border-subtle); margin-top: 4px; }
</style></head><body>
<div class="row" style="gap: 22px; align-items: flex-start;">
  <div class="field">
    <span class="l">单选时间</span>
    <div class="input-row focus" style="min-width: 180px;"><i data-lucide="clock"></i><span style="font-family: var(--zzt-font-num);">09 : 24</span></div>
    <div class="time-picker">
      <div class="time-cols">
        <div class="col-time">
          <div class="v">07</div><div class="v">08</div><div class="v sel">09</div><div class="v">10</div><div class="v">11</div><div class="v">12</div><div class="v">13</div>
        </div>
        <div class="col-time">
          <div class="v">20</div><div class="v">21</div><div class="v">22</div><div class="v">23</div><div class="v sel">24</div><div class="v">25</div><div class="v">26</div>
        </div>
        <div class="col-time">
          <div class="v">00</div><div class="v sel">00</div><div class="v">15</div><div class="v">30</div><div class="v">45</div>
        </div>
      </div>
      <div class="time-foot">
        <button class="btn ghost sm">此刻</button>
        <button class="btn primary sm">确认</button>
      </div>
    </div>
  </div>

  <div class="field" style="margin-left: 32px;">
    <span class="l">日期 + 时间</span>
    <div class="input-row" style="min-width: 240px;"><i data-lucide="calendar"></i><span style="font-family: var(--zzt-font-num);">2026-05-18 09:24</span></div>
    <span class="l" style="margin-top: 14px;">日期范围</span>
    <div class="range">
      <i data-lucide="calendar"></i>
      <span class="from">2026-05-12</span>
      <span class="sep-arrow">→</span>
      <span class="to">2026-05-18</span>
      <button>近 7 天 <i data-lucide="chevron-down"></i></button>
    </div>
    <span class="l" style="margin-top: 14px;">日期范围 · placeholder</span>
    <div class="range" style="color: var(--zzt-fg-subtle);">
      <i data-lucide="calendar"></i>
      <span class="from">开始日期</span>
      <span class="sep-arrow">→</span>
      <span class="to">结束日期</span>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
