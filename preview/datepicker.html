<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { background: var(--zzt-zinc-75); padding: 20px; }
  .cal { width: 280px; background:#fff; border-radius: 16px; box-shadow: var(--zzt-shadow-md);
         border: 1px solid rgba(0,0,0,.04); padding: 12px 14px 16px; }
  .cal-head { display:flex; align-items:center; justify-content: space-between; margin-bottom: 12px; }
  .cal-head .ctrl { display: inline-flex; gap: 2px; }
  .cal-head .btn-i { width: 28px; height: 28px; border-radius: 8px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; }
  .cal-head .btn-i:hover { background: var(--zzt-zinc-100); }
  .cal-head .btn-i i { width: 14px; height: 14px; }
  .cal-head .ttl { font-size: 14px; font-weight: 600; }
  .cal-week { display:grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
  .cal-week span { text-align:center; font-size: 11px; color: var(--zzt-fg-muted); padding: 4px 0; }
  .cal-grid { display:grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cell { aspect-ratio: 1/1; display:flex; align-items:center; justify-content:center;
          font-size: 12.5px; font-family: var(--zzt-font-num); font-variant-numeric: tabular-nums;
          color: var(--zzt-fg); border-radius: 8px; cursor: pointer; position: relative; }
  .cell:hover { background: var(--zzt-zinc-100); }
  .cell.muted { color: var(--zzt-fg-subtle); }
  .cell.today { font-weight: 600; }
  .cell.today::after { content:""; position:absolute; bottom: 4px; width:4px; height:4px; border-radius:999px; background: var(--zzt-accent-500); }
  .cell.sel { background: var(--zzt-accent-500); color:#fff; }
  .cell.in { background: var(--zzt-accent-soft); color: var(--zzt-accent-700); border-radius: 0; }
  .cell.in.start { border-radius: 8px 0 0 8px; background: var(--zzt-accent-500); color:#fff; }
  .cell.in.end   { border-radius: 0 8px 8px 0; background: var(--zzt-accent-500); color:#fff; }
  .cal-foot { display:flex; gap: 4px; margin-top: 12px; }
  .quick { font-size: 11.5px; padding: 3px 8px; border-radius: 999px; background: var(--zzt-zinc-100); color: var(--zzt-fg); border: 0; cursor: pointer; }
  .quick.active { background: var(--zzt-accent-soft); color: var(--zzt-accent-700); }
</style></head><body>
<div class="row" style="gap: 20px; align-items: flex-start;">
  <div class="cal">
    <div class="cal-head">
      <span class="ttl">2026 年 5 月</span>
      <div class="ctrl">
        <span class="btn-i"><i data-lucide="chevron-left"></i></span>
        <span class="btn-i"><i data-lucide="chevron-right"></i></span>
      </div>
    </div>
    <div class="cal-week"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
    <div class="cal-grid">
      <div class="cell muted">28</div><div class="cell muted">29</div><div class="cell muted">30</div>
      <div class="cell">1</div><div class="cell">2</div><div class="cell">3</div><div class="cell">4</div>
      <div class="cell">5</div><div class="cell">6</div><div class="cell">7</div><div class="cell">8</div>
      <div class="cell">9</div><div class="cell">10</div><div class="cell">11</div>
      <div class="cell">12</div><div class="cell">13</div><div class="cell">14</div><div class="cell">15</div>
      <div class="cell">16</div><div class="cell today">17</div><div class="cell sel">18</div>
      <div class="cell">19</div><div class="cell">20</div><div class="cell">21</div><div class="cell">22</div>
      <div class="cell">23</div><div class="cell">24</div><div class="cell">25</div>
      <div class="cell">26</div><div class="cell">27</div><div class="cell">28</div><div class="cell">29</div>
      <div class="cell">30</div><div class="cell">31</div><div class="cell muted">1</div>
    </div>
    <div class="cal-foot">
      <button class="quick">今日</button>
      <button class="quick">昨日</button>
      <button class="quick active">近 7 天</button>
      <button class="quick">本月</button>
    </div>
  </div>

  <div class="cal">
    <div class="cal-head">
      <span class="ttl">2026 年 5 月 · 范围</span>
      <div class="ctrl">
        <span class="btn-i"><i data-lucide="chevron-left"></i></span>
        <span class="btn-i"><i data-lucide="chevron-right"></i></span>
      </div>
    </div>
    <div class="cal-week"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
    <div class="cal-grid">
      <div class="cell muted">28</div><div class="cell muted">29</div><div class="cell muted">30</div>
      <div class="cell">1</div><div class="cell">2</div><div class="cell">3</div><div class="cell">4</div>
      <div class="cell">5</div><div class="cell">6</div><div class="cell">7</div><div class="cell">8</div>
      <div class="cell">9</div><div class="cell">10</div><div class="cell">11</div>
      <div class="cell in start">12</div><div class="cell in">13</div><div class="cell in">14</div><div class="cell in">15</div>
      <div class="cell in">16</div><div class="cell in">17</div><div class="cell in end">18</div>
      <div class="cell">19</div><div class="cell">20</div><div class="cell">21</div><div class="cell">22</div>
      <div class="cell">23</div><div class="cell">24</div><div class="cell">25</div>
      <div class="cell">26</div><div class="cell">27</div><div class="cell">28</div><div class="cell">29</div>
      <div class="cell">30</div><div class="cell">31</div><div class="cell muted">1</div>
    </div>
    <div class="cal-foot">
      <button class="quick">近 7 天</button>
      <button class="quick active">5-12 ~ 5-18</button>
      <button class="quick">本月</button>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
