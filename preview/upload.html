<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .drop {
    background:#fff; border: 1.5px dashed var(--zzt-border-strong); border-radius: 12px;
    padding: 28px 24px; display:flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; transition: border-color .15s ease, background .15s ease; width: 360px;
  }
  .drop:hover { border-color: var(--zzt-accent-500); background: rgba(255,15,39,.04); }
  .drop.active { border-color: var(--zzt-accent-500); background: rgba(255,15,39,.06); }
  .drop .ic { width: 44px; height: 44px; border-radius: 999px; background: var(--zzt-accent-soft); color: var(--zzt-accent-500); display:inline-flex; align-items:center; justify-content:center; }
  .drop .ic i { width: 22px; height: 22px; }
  .drop h4 { margin: 4px 0 0; font-size: 14px; font-weight: 500; }
  .drop p { margin: 0; font-size: 12px; color: var(--zzt-fg-muted); }
  .drop .types { font-size: 11px; color: var(--zzt-fg-subtle); }

  .file-list { display: flex; flex-direction: column; gap: 6px; width: 360px; }
  .file { display:flex; align-items: center; gap: 10px; background:#fff; border:1px solid var(--zzt-border-subtle);
          border-radius: 10px; padding: 8px 10px; }
  .file .fic { width: 28px; height: 28px; border-radius: 6px; background: var(--zzt-zinc-100); display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
  .file .fic i { width: 14px; height: 14px; color: var(--zzt-fg-muted); }
  .file .body { flex:1; min-width: 0; }
  .file .name { font-size: 13px; font-weight: 500; max-width: 230px; overflow:hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file .meta { font-size: 11px; color: var(--zzt-fg-muted); margin-top: 2px; }
  .file.error .name { color: var(--zzt-danger-500); }
  .file.error .meta { color: var(--zzt-danger-500); }
  .pb { height: 4px; background: var(--zzt-zinc-150); border-radius: 999px; overflow: hidden; margin-top: 4px; }
  .pb .fill { height: 100%; background: var(--zzt-accent-500); border-radius: 999px; }
  .file .icx { width: 24px; height: 24px; border-radius: 999px; display:inline-flex; align-items:center; justify-content:center; cursor: pointer; }
  .file .icx:hover { background: var(--zzt-zinc-150); }
  .file .icx i { width: 14px; height: 14px; color: var(--zzt-fg-muted); }
  .file .check { color: var(--zzt-success-500); }
</style></head><body>
<div class="row" style="gap: 22px; align-items: flex-start;">
  <div class="drop">
    <div class="ic"><i data-lucide="upload-cloud"></i></div>
    <h4>拖拽商品图片到此处</h4>
    <p>或 <span style="color: var(--zzt-accent-500); font-weight:500">点击选择文件</span></p>
    <span class="types">JPG / PNG / HEIC · 单张 ≤ 10 MB · 至多 8 张</span>
  </div>

  <div class="file-list">
    <div class="file">
      <div class="fic"><i data-lucide="image"></i></div>
      <div class="body">
        <div class="name">iPhone-14-Pro-front-01.heic</div>
        <div class="meta">已完成 · 2.4 MB</div>
      </div>
      <span class="check"><i data-lucide="check-circle-2" style="width:18px;height:18px;color:var(--zzt-success-500)"></i></span>
    </div>
    <div class="file">
      <div class="fic"><i data-lucide="image"></i></div>
      <div class="body">
        <div class="name">iPhone-14-Pro-back-01.heic</div>
        <div class="meta">上传中 · 62%</div>
        <div class="pb"><div class="fill" style="width: 62%"></div></div>
      </div>
      <span class="icx"><i data-lucide="x"></i></span>
    </div>
    <div class="file error">
      <div class="fic"><i data-lucide="image"></i></div>
      <div class="body">
        <div class="name">imei-photo-large.jpg</div>
        <div class="meta">文件过大 · 12.4 MB / 限制 10 MB</div>
      </div>
      <span class="icx"><i data-lucide="rotate-cw"></i></span>
      <span class="icx"><i data-lucide="x"></i></span>
    </div>
    <div class="file">
      <div class="fic"><i data-lucide="file-text"></i></div>
      <div class="body">
        <div class="name">质检报告-SKU58219.pdf</div>
        <div class="meta">已完成 · 482 KB</div>
      </div>
      <span class="check"><i data-lucide="check-circle-2" style="width:18px;height:18px;color:var(--zzt-success-500)"></i></span>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
