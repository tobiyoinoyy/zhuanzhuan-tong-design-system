<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><title>Data table</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { margin:0; padding:16px 18px; background:#fff; font-family:var(--zzt-font-sans); font-size:13px; }
  table { width:100%; border-collapse: collapse; }
  thead th { background: var(--zzt-zinc-75); font-weight:500; color: var(--zzt-fg-muted);
             font-size:12px; padding:10px 12px; text-align:left; border-bottom:1px solid var(--zzt-border-strong); white-space:nowrap;}
  tbody td { padding:12px; border-bottom:1px solid var(--zzt-border-subtle); }
  tbody tr:hover { background: var(--zzt-zinc-75); }
  tbody tr.sel { background: rgba(255,15,39,.06); }
  .ck { width:14px; height:14px; border:1.5px solid var(--zzt-border-strong); border-radius:3px; display:inline-block; vertical-align:middle; }
  .ck.checked { background: var(--zzt-accent-500); border-color:var(--zzt-accent-500); position:relative;}
  .ck.checked::after { content:""; position:absolute; left:3px; top:0px; width:5px; height:9px; border-right:2px solid #fff; border-bottom:2px solid #fff; transform: rotate(45deg);}
  .thumb { width:36px; height:36px; border-radius:6px; background:var(--zzt-zinc-100); display:inline-block; vertical-align:middle; }
  .sku { display:flex; align-items:center; gap:10px; }
  .num { font-family: var(--zzt-font-num); font-variant-numeric: tabular-nums; }
  .tag { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:500; padding:2px 8px; border-radius:999px; }
  .dot { width:5px; height:5px; border-radius:999px;}
</style></head><body>
<table>
  <thead><tr>
    <th style="width:30px"><span class="ck"></span></th>
    <th>商品</th>
    <th>分类</th>
    <th>状态</th>
    <th class="num">售价</th>
    <th class="num">库存</th>
    <th class="num">7 日 GMV</th>
  </tr></thead>
  <tbody>
    <tr class="sel"><td><span class="ck checked"></span></td>
      <td><div class="sku"><span class="thumb"></span>iPhone 14 Pro 256GB 深空黑</div></td>
      <td>手机</td>
      <td><span class="tag" style="background:rgba(23,201,100,.12); color:#0a8a44"><span class="dot" style="background:#17C964"></span>已上架</span></td>
      <td class="num">¥ 4,599</td><td class="num">28</td><td class="num">¥ 28,540</td>
    </tr>
    <tr><td><span class="ck"></span></td>
      <td><div class="sku"><span class="thumb"></span>iPad Air 5 64GB 紫色</div></td>
      <td>平板</td>
      <td><span class="tag" style="background:rgba(245,165,36,.15); color:#9a6608"><span class="dot" style="background:#F5A524"></span>待入仓</span></td>
      <td class="num">¥ 3,180</td><td class="num">7</td><td class="num">¥ 9,840</td>
    </tr>
    <tr><td><span class="ck"></span></td>
      <td><div class="sku"><span class="thumb"></span>MacBook Air M2 8+256</div></td>
      <td>笔记本</td>
      <td><span class="tag" style="background:rgba(255,15,39,.12); color:#A20017"><span class="dot" style="background:#FF0F27"></span>已质检</span></td>
      <td class="num">¥ 7,899</td><td class="num">3</td><td class="num">¥ 23,697</td>
    </tr>
  </tbody>
</table>
</body></html>
