<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .anchor { position: relative; width: 40px; height: 40px; background: var(--zzt-zinc-100);
            border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; }
  .anchor i { width: 18px; height: 18px; color: var(--zzt-fg-muted); }
  .badge-dot { position:absolute; top:-2px; right:-2px; width:8px; height:8px; border-radius:999px;
               background: var(--zzt-danger-500); border: 1.5px solid #fff; }
  .badge-num { position:absolute; top:-6px; right:-8px; min-width:18px; height:18px; padding:0 5px;
               border-radius:999px; background: var(--zzt-danger-500); color:#fff;
               font-size:10.5px; font-weight:600; display:inline-flex; align-items:center; justify-content:center;
               border: 1.5px solid #fff; font-family: var(--zzt-font-num); }
  .badge-inline { display:inline-flex; align-items:center; padding: 1px 6px; border-radius: 999px;
                  background: var(--zzt-zinc-150); color: var(--zzt-zinc-700);
                  font-size:11px; font-weight:600; }
  .badge-inline.danger { background: var(--zzt-danger-500); color:#fff; }
  .badge-inline.accent { background: var(--zzt-accent-500); color:#fff; }
</style></head><body>
<div class="row" style="gap: 28px;">
  <div class="col" style="align-items:center; gap:6px;">
    <div class="anchor"><i data-lucide="bell"></i><span class="badge-dot"></span></div>
    <span class="lab">dot</span>
  </div>
  <div class="col" style="align-items:center; gap:6px;">
    <div class="anchor"><i data-lucide="bell"></i><span class="badge-num">3</span></div>
    <span class="lab">count</span>
  </div>
  <div class="col" style="align-items:center; gap:6px;">
    <div class="anchor"><i data-lucide="bell"></i><span class="badge-num">12</span></div>
    <span class="lab">count 2-digit</span>
  </div>
  <div class="col" style="align-items:center; gap:6px;">
    <div class="anchor"><i data-lucide="bell"></i><span class="badge-num">99+</span></div>
    <span class="lab">overflow</span>
  </div>
  <div class="col" style="align-items:center; gap:6px;">
    <div class="anchor"><i data-lucide="package"></i><span class="badge-inline accent" style="position:absolute; top:-8px; right:-14px;">NEW</span></div>
    <span class="lab">label</span>
  </div>
</div>
<div class="row" style="margin-top: 18px;">
  <span class="lab" style="width:80px">inline</span>
  <span class="badge-inline">128</span>
  <span class="badge-inline danger">7</span>
  <span class="badge-inline accent">推荐</span>
  <span class="badge-inline" style="background: var(--zzt-purple-50); color: var(--zzt-purple-600)">活动中</span>
</div>
<script>lucide.createIcons();</script>
</body></html>
