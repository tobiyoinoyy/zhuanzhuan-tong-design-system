<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Colors · Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--zzt-bg); }
  .grid { display:grid; grid-template-columns: repeat(11, 1fr); gap:6px; }
  .sw { aspect-ratio: 1/1.1; border-radius:8px; border:1px solid rgba(0,0,0,0.06); display:flex; flex-direction:column; justify-content:flex-end; padding:6px; }
  .name { font-size:10px; font-weight:600; }
  .hex  { font-size:9px; opacity:.6; font-family: var(--zzt-font-mono); margin-top:2px; }
  .label { font-size:11px; color:var(--zzt-fg-muted); margin: 0 0 8px; text-transform:uppercase; letter-spacing:0.04em; font-weight:500;}
  .row { margin-bottom: 14px;}
</style></head><body>
<div class="label">Zinc neutral ramp · 80% of the surface area</div>
<div class="grid">
  <div class="sw" style="background:#FCFCFC; color:#18181B"><span class="name">50</span><span class="hex">FCFCFC</span></div>
  <div class="sw" style="background:#FAFAFA; color:#18181B"><span class="name">75</span><span class="hex">FAFAFA</span></div>
  <div class="sw" style="background:#F5F5F5; color:#18181B"><span class="name">100</span><span class="hex">F5F5F5</span></div>
  <div class="sw" style="background:#EBEBEC; color:#18181B"><span class="name">150</span><span class="hex">EBEBEC</span></div>
  <div class="sw" style="background:#E4E4E7; color:#18181B"><span class="name">200</span><span class="hex">E4E4E7</span></div>
  <div class="sw" style="background:#DEDEE0; color:#18181B"><span class="name">250</span><span class="hex">DEDEE0</span></div>
  <div class="sw" style="background:#A1A1AA; color:#fff"><span class="name">400</span><span class="hex">A1A1AA</span></div>
  <div class="sw" style="background:#71717A; color:#fff"><span class="name">500</span><span class="hex">71717A</span></div>
  <div class="sw" style="background:#52525B; color:#fff"><span class="name">600</span><span class="hex">52525B</span></div>
  <div class="sw" style="background:#28282C; color:#fff"><span class="name">800</span><span class="hex">28282C</span></div>
  <div class="sw" style="background:#18181B; color:#fff"><span class="name">900</span><span class="hex">18181B</span></div>
</div>
</body></html>
