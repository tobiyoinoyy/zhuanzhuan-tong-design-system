<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  .kbd { font-family: var(--zzt-font-mono); font-size: 11.5px;
         background: #fff; border: 1px solid var(--zzt-border-strong);
         border-bottom-width: 2px;
         border-radius: 5px; padding: 1px 6px; min-width: 20px; display: inline-block; text-align: center;
         color: var(--zzt-fg); line-height: 18px; }
  .kbd.dark { background: var(--zzt-zinc-800); color: #fff; border-color: var(--zzt-zinc-900); }
  .row + .row { margin-top: 12px; }
  .shortcut { display: inline-flex; align-items: center; gap: 4px; font-size: 12.5px; color: var(--zzt-fg-muted); }
  .shortcut + { margin-left: 24px; }
  .grp { display:flex; align-items:center; gap: 18px; margin-bottom: 6px; }
  .grp span:first-child { font-size: 13px; color: var(--zzt-fg); width: 140px; }
</style></head><body>
<div class="row" style="margin-bottom: 18px; gap: 8px;">
  <span class="kbd">⌘</span><span class="kbd">⇧</span><span class="kbd">K</span>
  <span class="kbd">Esc</span><span class="kbd">↩︎</span><span class="kbd">Tab</span>
  <span class="kbd">Ctrl</span><span class="kbd">Alt</span><span class="kbd">A</span>
  <span class="kbd">F11</span>
  <span class="kbd dark">⌘</span><span class="kbd dark">K</span>
</div>
<div style="margin-bottom: 6px; font-size: 12px; color: var(--zzt-fg-muted);">In context · keyboard shortcut for actions</div>
<div class="grp"><span>全局搜索</span><span class="shortcut"><span class="kbd">⌘</span><span class="kbd">K</span></span></div>
<div class="grp"><span>新建商品</span><span class="shortcut"><span class="kbd">⌘</span><span class="kbd">N</span></span></div>
<div class="grp"><span>批量上架</span><span class="shortcut"><span class="kbd">⌘</span><span class="kbd">⇧</span><span class="kbd">U</span></span></div>
<div class="grp"><span>选中下一行</span><span class="shortcut"><span class="kbd">↓</span></span></div>
<div class="grp"><span>取消选择</span><span class="shortcut"><span class="kbd">Esc</span></span></div>
</body></html>
