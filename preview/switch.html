<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  .sw { display:inline-flex; align-items:center; gap:10px; }
  .track { display:inline-block; position:relative; background: var(--zzt-zinc-200); border-radius: 999px; transition: background .15s ease; cursor:pointer; }
  .track .thumb { position:absolute; top:2px; left:2px; background:#fff; border-radius:999px;
                  box-shadow: 0 1px 2px rgba(0,0,0,.15); transition: left .15s ease; }
  .sm .track { width: 28px; height: 16px; } .sm .thumb { width: 12px; height: 12px; }
  .md .track { width: 36px; height: 20px; } .md .thumb { width: 16px; height: 16px; }
  .lg .track { width: 44px; height: 24px; } .lg .thumb { width: 20px; height: 20px; }
  .on .track { background: var(--zzt-accent-500); }
  .on.sm .thumb { left: 14px; } .on.md .thumb { left: 18px; } .on.lg .thumb { left: 22px; }
  .disabled { opacity: .4; pointer-events:none; }
  .label { font-size: 13.5px; font-weight: 500; }
  .desc { font-size: 12px; color: var(--zzt-fg-muted); margin-top: 2px; }
</style></head><body>
<div class="col" style="gap: 14px;">
  <div class="row" style="gap: 28px;">
    <div class="sw sm"><span class="track"><span class="thumb"></span></span><span class="lab">sm · off</span></div>
    <div class="sw sm on"><span class="track"><span class="thumb"></span></span><span class="lab">sm · on</span></div>
    <div class="sw md"><span class="track"><span class="thumb"></span></span><span class="lab">md · off</span></div>
    <div class="sw md on"><span class="track"><span class="thumb"></span></span><span class="lab">md · on</span></div>
    <div class="sw lg"><span class="track"><span class="thumb"></span></span><span class="lab">lg · off</span></div>
    <div class="sw lg on"><span class="track"><span class="thumb"></span></span><span class="lab">lg · on</span></div>
  </div>
  <div class="row" style="gap: 28px;">
    <div class="sw md on disabled"><span class="track"><span class="thumb"></span></span><span class="lab">disabled</span></div>
  </div>
  <hr style="border:0; border-top: 1px dashed var(--zzt-border-subtle);">
  <div class="row" style="gap: 28px;">
    <div class="sw md on">
      <span class="track"><span class="thumb"></span></span>
      <div><div class="label">参与「618 大促」</div><div class="desc">已加入活动 · 06-15 ~ 06-20</div></div>
    </div>
    <div class="sw md">
      <span class="track"><span class="thumb"></span></span>
      <div><div class="label">允许跨页选中</div><div class="desc">在分页之间保留选中状态</div></div>
    </div>
  </div>
</div>
</body></html>
